<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>
  <!-- 背景圆角矩形 -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>
  <!-- 复制图标：底层纸张 -->
  <rect x="10" y="12" width="13" height="14" rx="2" fill="rgba(255,255,255,0.35)"/>
  <!-- 复制图标：顶层纸张 -->
  <rect x="8" y="8" width="13" height="14" rx="2" fill="white"/>
  <!-- 过滤符号：三条横线（渐变缩短，表示过滤） -->
  <rect x="11" y="11" width="7" height="1.5" rx="0.75" fill="#6366F1"/>
  <rect x="11" y="14" width="5" height="1.5" rx="0.75" fill="#6366F1"/>
  <rect x="11" y="17" width="3" height="1.5" rx="0.75" fill="#6366F1"/>
</svg>
