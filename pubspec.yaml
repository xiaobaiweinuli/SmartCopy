name: smartcopy
description: SmartCopy - 智能过滤式文件复制工具（Windows）
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.35.0'

dependencies:
  flutter:
    sdk: flutter

  # 窗口与托盘
  window_manager: ^0.3.9
  tray_manager: ^0.2.3
  hotkey_manager: ^0.2.3

  # 状态与持久化
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  path_provider: ^2.1.3

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # 文件操作
  file_picker: ^8.1.2
  path: ^1.9.0

  # Windows API（注册表 / 剪贴板）
  win32: ^5.5.5
  ffi: ^2.1.3

  # 工具
  uuid: ^4.4.0
  intl: ^0.19.0
  local_notifier: ^0.1.6
  charset: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
