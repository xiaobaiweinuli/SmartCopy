name: Build and Release SmartCopy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # 允许手动触发
    inputs:
      version:
        description: '版本号 (例如: 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows app
        run: flutter build windows --release

      - name: Prepare release package
        id: prepare
        shell: pwsh
        run: |
          # 获取版本号：tag 触发时从 tag 提取，手动触发时使用输入参数
          $version = if ($env:GITHUB_REF -match 'refs/tags/v(.*)') { 
            $matches[1] 
          } else { 
            '${{ github.event.inputs.version }}' 
          }
          $packageName = "SmartCopy_${version}_Windows_x64"
          $sourceDir = "build\windows\x64\runner\Release"
          $stagingDir = "release\$packageName"
          
          # 确保目录存在
          if (Test-Path "release") { Remove-Item -Recurse -Force "release" }
          New-Item -ItemType Directory -Path $stagingDir -Force
          
          # 复制文件
          Copy-Item -Path "$sourceDir\*" -Destination $stagingDir -Recurse
          
          # 创建 ZIP 压缩包
          $zipPath = "release\${packageName}.zip"
          Compress-Archive -Path "$stagingDir\*" -DestinationPath $zipPath -Force
          
          # 调试：列出 release 目录内容
          Write-Host "Release directory contents:"
          Get-ChildItem -Path "release" -Recurse
          
          echo "package_path=$zipPath" >> $env:GITHUB_OUTPUT
          echo "package_name=${packageName}.zip" >> $env:GITHUB_OUTPUT
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          name: SmartCopy ${{ steps.prepare.outputs.version }}
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', github.event.inputs.version) }}
          draft: false
          prerelease: false
          body: |
            # SmartCopy ${{ steps.prepare.outputs.version }}
            
            ## 安装使用
            - 下载 `SmartCopy_${{ steps.prepare.outputs.version }}_Windows_x64.zip`
            - 解压到任意文件夹
            - 双击 `smartcopy.exe` 运行
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


